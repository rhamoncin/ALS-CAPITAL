<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALS Capital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
<style>
  :root {
    --cream: #F5EDE8;
    --cream-dark: #EDE3DC;
    --burgundy: #6B2737;
    --burgundy-light: #8B3545;
    --burgundy-pale: #F0E6E8;
    --text-dark: #1C1C1C;
    --text-mid: #4A4A4A;
    --text-light: #7A7A7A;
    --green: #2D6A4F;
    --red: #B5292C;
    --border: #D8D0C4;
    --card-bg: #FFFFFF;
    --shadow: 0 2px 16px rgba(107,39,55,0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
  }

  /* NAV */
  nav {
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 0 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }

  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--burgundy);
    letter-spacing: 0.02em;
    cursor: pointer;
  }

  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }

  .nav-links a {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-mid);
    text-decoration: none;
    cursor: pointer;
    transition: color 0.2s;
  }

  .nav-links a:hover, .nav-links a.active {
    color: var(--burgundy);
  }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  /* HERO */
  .hero {
    padding: 72px 48px 56px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .hero-label {
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--burgundy);
    margin-bottom: 12px;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3.2rem;
    font-weight: 700;
    color: var(--text-dark);
    line-height: 1.1;
    margin-bottom: 12px;
  }

  .hero-sub {
    font-size: 1rem;
    color: var(--text-light);
    margin-bottom: 32px;
  }

  .hero-metrics {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 40px;
  }

  .metric-pill {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 10px 20px;
    font-size: 0.85rem;
  }

  .metric-pill .label { color: var(--text-light); font-size: 0.75rem; }
  .metric-pill .val { font-weight: 600; }
  .metric-pill .val.pos { color: var(--green); }
  .metric-pill .val.neg { color: var(--red); }
  .metric-pill .val.bur { color: var(--burgundy); font-family: 'Playfair Display', serif; font-size: 1rem; }

  .hero-btns {
    display: flex;
    gap: 12px;
    margin-bottom: 56px;
  }

  .btn-primary {
    background: var(--burgundy);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 12px 28px;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .btn-primary:hover { background: var(--burgundy-light); }

  .btn-secondary {
    background: transparent;
    color: var(--text-dark);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 28px;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .btn-secondary:hover { border-color: var(--burgundy); color: var(--burgundy); }

  /* SECTION */
  .section {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 32px 64px;
  }

  .section-label {
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--burgundy);
    margin-bottom: 8px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--text-dark);
    margin-bottom: 28px;
  }

  .divider {
    width: 40px;
    height: 2px;
    background: var(--burgundy);
    margin-bottom: 32px;
    opacity: 0.4;
  }

  /* TABLE */
  .table-wrap {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-light);
    padding: 12px 12px;
    text-align: left;
    background: var(--cream-dark);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }

  thead th:hover { color: var(--burgundy); }

  tbody tr {
    border-bottom: 1px solid var(--cream-dark);
    transition: background 0.15s;
    cursor: pointer;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--cream); }

  td {
    padding: 12px 12px;
    font-size: 0.84rem;
  }

  .ticker-bold {
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--text-dark);
  }

  .company-name {
    font-size: 0.8rem;
    color: var(--text-light);
    margin-top: 2px;
  }

  .ret-pos { color: var(--green); font-weight: 500; }
  .ret-neg { color: var(--red); font-weight: 500; }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  .badge-high { background: #E8F0EC; color: var(--green); }
  .badge-medium { background: #FFF3E0; color: #E65100; }
  .badge-low { background: var(--cream-dark); color: var(--text-light); }
  .badge-pending { background: var(--cream-dark); color: var(--text-light); }

  /* PERIOD SELECTOR */
  .period-selector {
    display: flex;
    gap: 4px;
    background: var(--cream-dark);
    border-radius: 8px;
    padding: 4px;
  }

  .period-btn {
    background: none;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-light);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }

  .period-btn:hover { color: var(--text-dark); }
  .period-btn.active {
    background: var(--card-bg);
    color: var(--burgundy);
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  /* CHART */
  .chart-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    box-shadow: var(--shadow);
    margin-bottom: 32px;
  }

  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 24px;
  }

  .chart-title {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 6px;
  }

  .chart-value {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 600;
  }

  .chart-value.pos { color: var(--green); }
  .chart-value.neg { color: var(--red); }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    box-shadow: var(--shadow);
  }

  .stat-label {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--text-dark);
  }

  .stat-value.pos { color: var(--green); }
  .stat-value.neg { color: var(--red); }

  /* RECAP */
  .recap-nav {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }

  .recap-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    color: var(--text-mid);
    transition: all 0.2s;
  }

  .recap-btn:hover { border-color: var(--burgundy); color: var(--burgundy); }

  .recap-date {
    font-size: 0.8rem;
    color: var(--text-light);
    min-width: 120px;
    text-align: center;
  }

  .recap-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 32px;
    box-shadow: var(--shadow);
    line-height: 1.8;
    font-size: 0.92rem;
    color: var(--text-mid);
  }

  .recap-card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--text-dark);
    margin-bottom: 16px;
  }

  .recap-card p { margin-bottom: 12px; }

  /* ITAS */
  .itas-metrics {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  /* PHILOSOPHY */
  .philosophy-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-bottom: 48px;
  }

  .phil-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
  }

  .phil-letter {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--burgundy);
    margin-bottom: 6px;
  }

  .phil-title {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 8px;
  }

  .phil-desc { font-size: 0.85rem; color: var(--text-light); line-height: 1.6; }

  /* PORTFOLIO DETAIL PAGE */
  .company-header {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 32px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }

  .company-ticker {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--burgundy);
  }

  .company-full-name {
    font-size: 1.1rem;
    color: var(--text-mid);
    margin-bottom: 16px;
  }

  .company-meta {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .company-meta-item { font-size: 0.82rem; color: var(--text-light); }
  .company-meta-item span { color: var(--text-dark); font-weight: 500; }

  .company-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .placeholder-box {
    background: var(--card-bg);
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 40px;
    text-align: center;
    color: var(--text-light);
    font-size: 0.85rem;
  }

  .placeholder-box .ph-label {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--burgundy);
    opacity: 0.5;
    margin-bottom: 8px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    color: var(--text-light);
    cursor: pointer;
    margin-bottom: 24px;
    transition: color 0.2s;
  }

  .back-btn:hover { color: var(--burgundy); }

  /* WATCHLIST / MACRO / ARTICLES */
  .coming-soon {
    text-align: center;
    padding: 80px 48px;
    max-width: 500px;
    margin: 0 auto;
  }

  .coming-soon .cs-icon {
    font-size: 2.5rem;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .coming-soon h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--text-dark);
    margin-bottom: 10px;
  }

  .coming-soon p { color: var(--text-light); font-size: 0.9rem; }

  /* RATIOS */
  .card-section {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    box-shadow: var(--shadow);
  }

  .ratios-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .ratio-item {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    min-width: 100px;
    flex: 0 0 auto;
  }

  .ratio-label {
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 4px;
    white-space: nowrap;
  }

  .ratio-value {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-dark);
  }

  .ratio-value.neg { color: var(--red); }

  .thesis-box {
    font-size: 0.88rem;
    color: var(--text-mid);
    line-height: 1.7;
    min-height: 80px;
  }

  /* PIE CHARTS */
  .pie-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }

  .pie-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .pie-title {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 16px;
    align-self: flex-start;
  }

  .pie-card canvas { max-width: 280px; max-height: 280px; }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 24px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.78rem;
    color: var(--text-light);
    max-width: 100%;
    margin-top: 40px;
  }

  .footer-logo {
    font-family: 'Playfair Display', serif;
    color: var(--burgundy);
    font-weight: 600;
  }

  /* HAMBURGER */
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 4px;
  }
  .hamburger span {
    width: 22px;
    height: 2px;
    background: var(--burgundy);
    border-radius: 2px;
    transition: all 0.3s;
  }

  /* MOBILE MENU */
  .mobile-menu {
    display: none;
    position: fixed;
    top: 60px;
    left: 0;
    right: 0;
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    z-index: 99;
    padding: 16px 24px;
    flex-direction: column;
    gap: 0;
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a {
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-mid);
    text-decoration: none;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .mobile-menu a:last-child { border-bottom: none; }
  .mobile-menu a.active { color: var(--burgundy); }

  /* MOBILE CARDS */
  .mobile-cards { display: none; }
  .mobile-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 10px;
    cursor: pointer;
  }
  .mobile-card:active { background: var(--cream); }
  .mobile-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }
  .mobile-card-ticker { font-weight: 700; font-size: 1rem; color: var(--text-dark); }
  .mobile-card-ret { font-weight: 600; font-size: 0.9rem; }
  .mobile-card-name { font-size: 0.78rem; color: var(--text-light); margin-bottom: 8px; }
  .mobile-card-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 0.75rem;
    color: var(--text-mid);
  }
  .mobile-card-meta span { background: var(--cream); padding: 2px 8px; border-radius: 12px; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {

    nav { padding: 0 20px; }
    .nav-links { display: none; }
    .hamburger { display: flex; }

    .hero { padding: 40px 20px 32px; }
    .hero h1 { font-size: 2.2rem; }
    .hero-metrics { flex-direction: column; gap: 8px; }
    .hero-btns { flex-direction: column; }
    .btn-primary, .btn-secondary { width: 100%; text-align: center; }

    .section { padding: 0 16px 48px; }

    .stats-row { grid-template-columns: 1fr 1fr; gap: 10px; }
    .itas-metrics { grid-template-columns: 1fr; }
    .pie-row { grid-template-columns: 1fr; }
    .company-grid { grid-template-columns: 1fr; }
    .philosophy-grid { grid-template-columns: 1fr; }

    /* Hide tables, show cards */
    .table-wrap { display: none; }
    .mobile-cards { display: block; }

    .company-meta { flex-direction: column; gap: 8px; }

    .chart-header { flex-direction: column; gap: 12px; align-items: flex-start; }
    .period-selector { flex-wrap: wrap; gap: 3px; }
    .period-btn { padding: 5px 10px; font-size: 0.7rem; }

    .recap-nav { flex-wrap: wrap; gap: 8px; }

    footer { flex-direction: column; gap: 8px; text-align: center; padding: 20px; }

    [style*="padding: 48px 48px"] { padding: 32px 20px 16px !important; }
    [style*="padding: 48px"] { padding: 20px !important; }

    .ratios-row { flex-wrap: wrap; }
    .ratio-item { min-width: 120px; flex: 1; }

    .section-title { font-size: 1.4rem; }
    .chart-value { font-size: 1.5rem; }
  }

  .article-body h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: var(--text-dark); margin: 0 0 8px; line-height: 1.25; }
  .article-body h2 { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--text-dark); margin: 40px 0 14px; border-left: 3px solid var(--burgundy); padding-left: 14px; }
  .article-body p { font-size: 0.95rem; line-height: 1.85; color: var(--text-mid); margin: 0 0 18px; }
  .article-body strong { color: var(--text-dark); font-weight: 600; }
  .article-body em { color: var(--text-light); font-style: italic; }
  .article-body hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

  </style>
</head>
<body>

<nav>
  <div class="nav-logo" onclick="showPage('home');closeMobileMenu()">ALS Capital</div>
  <ul class="nav-links">
    <li><a onclick="showPage('home')" id="nav-home" class="active">Inicio</a></li>
    <li><a onclick="showPage('portfolio'); closeCompany();" id="nav-portfolio">Portfolio ALS</a></li>
    <li><a onclick="showPage('itas')" id="nav-itas">Portfolio ITAS</a></li>
    <li><a onclick="showPage('watchlist')" id="nav-watchlist">Watchlist</a></li>
    <li><a onclick="showPage('macro')" id="nav-macro">Macro</a></li>
    <li><a onclick="showPage('articles')" id="nav-articles">Artículos</a></li>
  </ul>
  <div class="hamburger" onclick="toggleMobileMenu()" id="hamburger">
    <span></span><span></span><span></span>
  </div>
</nav>

<div class="mobile-menu" id="mobile-menu">
  <a onclick="showPage('home');closeMobileMenu()" id="mnav-home" class="active">Inicio</a>
  <a onclick="showPage('portfolio');closeCompany();closeMobileMenu()" id="mnav-portfolio">Portfolio ALS</a>
  <a onclick="showPage('itas');closeMobileMenu()" id="mnav-itas">Portfolio ITAS</a>
  <a onclick="showPage('watchlist');closeMobileMenu()" id="mnav-watchlist">Watchlist</a>
  <a onclick="showPage('macro');closeMobileMenu()" id="mnav-macro">Macro</a>
  <a onclick="showPage('articles');closeMobileMenu()" id="mnav-articles">Artículos</a>
</div>

<!-- ===================== HOME ===================== -->
<div id="page-home" class="page active">

  <div class="hero">
    <div class="hero-label">Value Investing</div>
    <h1>ALS Capital</h1>
    <p class="hero-sub">Inversión en valor. Small & mid caps globales.</p>

    <div style="margin-bottom:10px;font-size:0.75rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--burgundy);font-weight:700">ALS Capital</div>
    <div class="hero-metrics">

const alsCashEUR = 1522;

function calcPosition(p) {
  const totalCostEUR = alsPositions.reduce((s,x) => s + x.costBasis * FX[x.currency], 0) + alsCashEUR;
  const costEUR = p.costBasis * FX[p.currency];
  const pct = costEUR / totalCostEUR * 100;
  let currentEUR;
  if (p.gbx) currentEUR = (p.currentPrice / 100) * p.shares * FX['GBP'];
  else currentEUR = p.currentPrice * p.shares * FX[p.currency];
  const ret = (currentEUR - costEUR) / costEUR * 100;
  const avgEntry = p.gbx
    ? ((p.costBasis / p.shares) / 100).toFixed(4)
    : (p.costBasis / p.shares).toFixed(2);
  return { pct: pct.toFixed(1), ret: ret.toFixed(1), costEUR: costEUR.toFixed(0), avgEntry, currency: p.gbx ? 'GBP' : p.currency };
}

}

let wlChart = null;
let activeWlPeriod = 'ALL';
let currentWlTicker = null;

function renderWlTbody() {
  const tbody = document.getElementById('wl-tbody');
  tbody.innerHTML = '';
  watchlist.forEach(w => {
    const upside = w.consenso ? ((w.consenso - w.precioActual) / w.precioActual * 100).toFixed(1) : null;
    const isUp = upside && parseFloat(upside) >= 0;
    const tr = document.createElement('tr');
    tr.style.background = '#FAFAF8';
    tr.innerHTML = `
      <td><div class="ticker-bold">${w.ticker}</div></td>
      <td style="color:var(--text-dark)">${w.name}</td>
      <td style="color:var(--text-mid)">${w.sector}</td>
      <td>${w.precioActual} ${w.currency}</td>
      <td>${w.consenso ? w.consenso + ' ' + w.currency : '—'}</td>
      <td>${upside ? `<span class="badge ${isUp?'badge-high':'badge-pending'}" style="color:${isUp?'var(--green)':'var(--red)'}">${isUp?'+':''}${upside}%</span>` : '—'}</td>
      <td style="color:var(--text-light)">${w.targetPrice || 'Pendiente'}</td>`;
    tr.onclick = () => openWatchlistCompany(w.ticker);
    tbody.appendChild(tr);
  });
}

function filterWlData(ticker, period) {
  const w = watchlist.find(x => x.ticker === ticker);
  if (!w) return [];
  const data = w.priceHistory;
  const now = new Date('2026-05-16');
  let cutoff;
  if (period === '1M') { cutoff = new Date(now); cutoff.setMonth(cutoff.getMonth()-1); }
  else if (period === 'YTD') { cutoff = new Date('2026-01-01'); }
  else if (period === 'LTM') { cutoff = new Date(now); cutoff.setFullYear(cutoff.getFullYear()-1); }
  else if (period === '3Y') { cutoff = new Date(now); cutoff.setFullYear(cutoff.getFullYear()-3); }
  else if (period === '5Y') { cutoff = new Date(now); cutoff.setFullYear(cutoff.getFullYear()-5); }
  else { cutoff = new Date('2000-01-01'); }
  return data.filter(d => new Date(d[0]) >= cutoff);
}

function setWlPeriod(period) {
  activeWlPeriod = period;
  const labelMap = {'1M':'1M','YTD':'YTD','LTM':'LTM','3Y':'3A','5Y':'5A','ALL':'Todo'};
  document.querySelectorAll('#wl-detail .period-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === labelMap[period]);
  });
  if (currentWlTicker) renderWlChart(currentWlTicker);
}

function renderWlChart(ticker) {
  const data = filterWlData(ticker, activeWlPeriod);
  const ctx = document.getElementById('wlChart').getContext('2d');
  const vals = data.map(d => d[1]);
  const lastVal = vals[vals.length-1];
  const firstVal = vals[0];
  const isUp = lastVal >= firstVal;
  const color = isUp ? '#2D6A4F' : '#B5292C';
  document.getElementById('wl-price-label').textContent = lastVal ? lastVal.toFixed(2) : '—';
  if (wlChart) wlChart.destroy();
  wlChart = new Chart(ctx, {
    type: 'line',
    data: { labels: data.map(d=>d[0]), datasets: [{
      data: vals, borderColor: color, borderWidth: 2,
      pointRadius: 0, pointHoverRadius: 5, pointHoverBackgroundColor: color,
      fill: true, backgroundColor: isUp?'rgba(45,106,79,0.07)':'rgba(181,41,44,0.07)', tension: 0.3
    }]},
    options: {
      responsive: true,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { display:false },
        tooltip: {
          backgroundColor:'white', titleColor:'#1C1C1C', bodyColor:'#4A4A4A',
          borderColor:'#D8D0C4', borderWidth:1, padding:10,
          callbacks: {
            title: items => { const d=new Date(items[0].label); return d.toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}); },
            label: c => ' '+c.raw.toFixed(2)+' USD'
          }
        }
      },
      scales: {
        x: { grid:{display:false}, ticks:{font:{size:10},color:'#7A7A7A',maxTicksLimit:10,
          callback:(val,i)=>{ const d=new Date(data[i]?.[0]); return d.toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'2-digit'}); }
        }},
        y: { grid:{color:'#EDE7D9'}, ticks:{font:{size:10},color:'#7A7A7A',callback:v=>v.toFixed(2)} }
      }
    }
  });
}

function openWatchlistCompany(ticker) {
  const w = watchlist.find(x => x.ticker === ticker);
  if (!w) return;
  document.getElementById('wl-ticker').textContent = w.ticker;
  document.getElementById('wl-name').textContent = w.name;
  document.getElementById('wl-sector').textContent = w.sector;
  document.getElementById('wl-price').textContent = w.precioActual + ' ' + w.currency;
  document.getElementById('wl-consensus').textContent = w.consenso ? w.consenso + ' ' + w.currency : '—';
  document.getElementById('wl-target').textContent = w.targetPrice || 'Pendiente';
  document.getElementById('wl-description').innerHTML = w.descripcion || '<p style="color:var(--text-light);font-style:italic">Sin descripción.</p>';
  document.getElementById('wl-thesis').innerHTML = w.tesis || '<p style="color:var(--text-light);font-style:italic">Añade tu tesis aquí.</p>';

  const risksCard = document.getElementById('wl-risks-card');
  const risksEl = document.getElementById('wl-risks');
  if (w.riesgos) {
    risksEl.innerHTML = w.riesgos;
    risksCard.style.display = '';
  } else {
    risksCard.style.display = 'none';
  }

  const upside = w.consenso ? ((w.consenso - w.precioActual) / w.precioActual * 100).toFixed(1) : null;
  const upsideWrap = document.getElementById('wl-upside-wrap');
  const upsideEl = document.getElementById('wl-upside');
  if (upside) {
    const isUp = parseFloat(upside) >= 0;
    upsideEl.textContent = (isUp?'+':'')+upside+'%';
    upsideEl.className = 'badge '+(isUp?'badge-high':'badge-pending');
    upsideEl.style.color = isUp?'var(--green)':'var(--red)';
    upsideWrap.style.display = '';
  } else { upsideWrap.style.display = 'none'; }

  const imagesCard = document.getElementById('wl-images-card');
  const imagesEl = document.getElementById('wl-valuation');
  if (w.imagenes && w.imagenes.length > 0) {
    imagesEl.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px';
    imagesEl.innerHTML = w.imagenes.map(img => `
      <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;box-shadow:var(--shadow)">
        <img src="${img.src}" alt="${img.caption||''}"
          style="width:100%;display:block;border-radius:4px">
        ${img.caption ? `<div style="font-size:0.7rem;color:var(--text-light);margin-top:10px;text-align:center;font-style:italic">${img.caption}</div>` : ''}
      </div>`).join('');
    imagesCard.style.display = '';
  } else {
    imagesCard.style.display = 'none';
  }
  document.getElementById('wl-detail').style.display = 'block';
  currentWlTicker = ticker;
  activeWlPeriod = 'ALL';
  setTimeout(() => renderWlChart(ticker), 50);
}

function closeWatchlist() {
  document.getElementById('wl-list').style.display = 'block';
  document.getElementById('wl-detail').style.display = 'none';
  currentWlTicker = null;
}

// ====== SORTABLE TABLES ======
const alsSort = { col: 'ticker', dir: 1 };
const itasSort = { col: 'ticker', dir: 1 };

function sortIcon(table, col) {
  const s = table === 'als' ? alsSort : itasSort;
  if (s.col !== col) return ' <span style="opacity:0.3">↕</span>';
  return s.dir === 1 ? ' <span style="color:var(--burgundy)">↑</span>' : ' <span style="color:var(--burgundy)">↓</span>';
}

function sortAls(col) {
  if (alsSort.col === col) alsSort.dir *= -1;
  else { alsSort.col = col; alsSort.dir = 1; }
  renderHomeTbody();
  renderPortfolioTbody();
  updateAlsHeaders();
}

function sortItas(col) {
  if (itasSort.col === col) itasSort.dir *= -1;
  else { itasSort.col = col; itasSort.dir = 1; }
  renderItasTbody();
  updateItasHeaders();
}

function getSortedAls() {
  return [...alsPositions].sort((a, b) => {
    const { pct: pctA, ret: retA } = calcPosition(a);
    const { pct: pctB, ret: retB } = calcPosition(b);
    const map = { ticker: [a.ticker, b.ticker], pct: [parseFloat(pctA), parseFloat(pctB)], ret: [parseFloat(retA), parseFloat(retB)] };
    const [va, vb] = map[alsSort.col] || [a.ticker, b.ticker];
    if (va < vb) return -1 * alsSort.dir;
    if (va > vb) return 1 * alsSort.dir;
    return 0;
  });
}

function getSortedItas() {
  return [...itasPositions].sort((a, b) => {
    const map = { ticker: [a.ticker, b.ticker], pct: [a.pct, b.pct] };
    const [va, vb] = map[itasSort.col] || [a.ticker, b.ticker];
    if (va < vb) return -1 * itasSort.dir;
    if (va > vb) return 1 * itasSort.dir;
    return 0;
  });
}

function renderMobileCards(containerId, positions, onClickFn) {
  const el = document.getElementById(containerId);

  el.innerHTML = '';
  positions.forEach(p => {
    const div = document.createElement('div');
    div.className = 'mobile-card';
    const ret = p.ret !== undefined ? p.ret : null;
    const pct = p.pct !== undefined ? p.pct : null;
    div.innerHTML = `
      <div class="mobile-card-top">
        <div class="ticker-bold">${p.ticker}</div>
        ${ret !== null ? `<div class="mobile-card-ret ${parseFloat(ret)>=0?'ret-pos':'ret-neg'}">${parseFloat(ret)>=0?'+':''}${ret}%</div>` : ''}

      <div class="mobile-card-name">${p.name || p.nombre || ''}</div>
      <div class="mobile-card-meta">
        ${pct !== null ? `<span>% ${pct}%</span>` : ''}

        ${p.sector ? `<span>${p.sector}</span>` : ''}

  if (period === '1M') { cutoff = new Date(now); cutoff.setMonth(cutoff.getMonth() - 1); }
  else if (period === '3M') { cutoff = new Date(now); cutoff.setMonth(cutoff.getMonth() - 3); }
  else if (period === 'YTD') { cutoff = new Date('2026-01-01'); }
  else if (period === 'LTM') { cutoff = new Date(now); cutoff.setFullYear(cutoff.getFullYear() - 1); }
  else { cutoff = new Date('2000-01-01'); }
  const filtered = twrData.filter(d => new Date(d.date) >= cutoff);

  // Re-base: show return relative to start of period
  if (period !== 'ALL' && filtered.length > 0) {
    const base = filtered[0].twr;
    return filtered.map(d => ({ ...d, twr: parseFloat((d.twr - base).toFixed(2)) }));
  }
  return filtered;
}

function calcPeriodReturn(period) {
  const filtered = filterByPeriod(period);
  if (!filtered.length) return null;
  return filtered[filtered.length - 1].twr;
}

function fmtStat(val) {
  if (val === null) return '—';
  const cls = val >= 0 ? 'pos' : 'neg';
  return `<span class="${cls}">${val >= 0 ? '+' : ''}${val.toFixed(2)}%</span>`;
}

function setPeriod(period) {
  activePeriod = period;
  document.querySelectorAll('.period-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === period || (period === 'ALL' && b.textContent === 'Todo'));

function renderRatios(ticker, currentPrice) {
  const m = multiplos[ticker] || {};
  const grid = document.getElementById('det-ratios-grid');

  const fields = [
    { key: 'evEbitda', label: 'EV/EBITDA' },
    { key: 'pFcf', label: 'P/FCF' },
    { key: 'fcfYield', label: 'FCF Yield' },
    { key: 'netDebtEbitda', label: 'Deuda Neta/EBITDA' },
    { key: 'divYield', label: 'Dividend Yield' },
    { key: 'roce', label: 'ROCE' },
    { key: 'uraniumPrice', label: 'Uranium (USD/lb)', noSuffix: true },
  ];

  let html = '';
  fields.forEach(f => {
    const val = m[f.key];
    if (val === undefined || val === null) return;
    const display = f.noSuffix ? val : (typeof val === 'number' ? val + 'x' : val);
    const isNeg = typeof val === 'number' && val < 0;
    html += `<div class="ratio-item">
      <div class="ratio-label">${f.label}</div>
      <div class="ratio-value ${isNeg ? 'neg' : ''}">${display}</div>
    </div>`;
  });

  if (!html) {
    html = '<p style="color:var(--text-light);font-size:0.85rem">Sin datos disponibles.</p>';
  }
  grid.innerHTML = html;

  const hasTraditionalRatios = fields.some(f => f.key !== 'uraniumPrice' && m[f.key] !== undefined);
  const sectionTitle = hasTraditionalRatios ? 'Ratios y Múltiplos' : 'Datos de referencia';
  const sectionEl = grid.closest('.card-section')?.querySelector('.section-label');
  if (sectionEl) sectionEl.textContent = sectionTitle;
  const wrap = document.getElementById('det-consensus-wrap');
  const priceEl = document.getElementById('det-consensus-price');
  const upsideEl = document.getElementById('det-consensus-upside');
  if (m.consenso && currentPrice) {
    const upside = ((m.consenso - currentPrice) / currentPrice * 100).toFixed(1);
    const isUp = parseFloat(upside) >= 0;
    priceEl.textContent = m.consenso;
    upsideEl.textContent = (isUp ? '+' : '') + upside + '%';
    upsideEl.className = 'badge ' + (isUp ? 'badge-high' : 'badge-pending');
    upsideEl.style.color = isUp ? 'var(--green)' : 'var(--red)';
    wrap.style.display = '';
  } else {
    wrap.style.display = 'none';
  }
}

function filterStockData(ticker, period) {
  const data = priceHistory[ticker];
  if (!data || !data.length) return [];
  const now = new Date('2026-05-16');
  let cutoff;
  if (period === 'LW') { cutoff = new Date(now); cutoff.setDate(cutoff.getDate() - 7); }
  else if (period === '1M') { cutoff = new Date(now); cutoff.setMonth(cutoff.getMonth() - 1); }
  else if (period === 'YTD') { cutoff = new Date('2026-01-01'); }
  else if (period === 'LTM') { cutoff = new Date(now); cutoff.setFullYear(cutoff.getFullYear() - 1); }
  else if (period === '1Y') { cutoff = new Date(now); cutoff.setFullYear(cutoff.getFullYear() - 1); }
  else if (period === '3Y') { cutoff = new Date(now); cutoff.setFullYear(cutoff.getFullYear() - 3); }
  else if (period === '5Y') { cutoff = new Date(now); cutoff.setFullYear(cutoff.getFullYear() - 5); }
  else { cutoff = new Date('2000-01-01'); }
  return data.filter(d => new Date(d[0]) >= cutoff);
}

<hr>
<h2>El contexto antes del conflicto: oferta ajustada, demanda resiliente</h2>
<p>Antes del estallido del conflicto, el mercado del petróleo arrancaba 2026 con un equilibrio delicado. La OPEC+ mantenía recortes voluntarios y la capacidad excedentaria efectiva del grupo superaba los <strong>4 mb/d</strong> en el cuarto trimestre de 2025 — excluyendo países sancionados. La mayor parte de esa spare capacity estaba concentrada en Arabia Saudí, con EAU en segundo lugar.</p>
<p>El problema estructural de esa capacidad de reserva es su ubicación geográfica: casi toda ella está en la región del Golfo, accesible únicamente a través del mismo estrecho cuyo cierre se convertiría en el shock central del mercado. Es decir, el colchón de oferta que normalmente estabilizaría el precio en un shock de oferta quedaba atrapado dentro del mismo cuello de botella.</p>
<p>La demanda global, por su parte, se mostraba resiliente. La IEA proyectaba un crecimiento de +850 kb/d para 2026 antes del conflicto, con Asia liderando el incremento. Los inventarios globales observables se situaban por encima de <strong>8,2 mil millones de barriles</strong> a comienzos de 2026 — su nivel más alto desde febrero de 2021 — lo que ofrecía un colchón temporal, aunque no una solución estructural.</p>
<hr>
<h2>El cierre y sus cifras: una disrupción sin precedentes recientes</h2>
<p>Cuando el conflicto interrumpió el tráfico por Ormuz, los efectos fueron inmediatos y severos. Según datos de S&P Global y Kpler, los flujos diarios a través del estrecho cayeron hasta representar apenas el <strong>6% del nivel prebélico</strong> en términos de media móvil de cuatro días — de cerca de 20 mb/d a aproximadamente <strong>1,3 mb/d</strong>.</p>
<p>La producción de los países del Golfo no tardó en verse afectada. Cuando el almacenamiento onshore se acerca a su límite operativo, los productores no tienen alternativa: o detienen el bombeo o asumen el riesgo de saturar la infraestructura. JPMorgan alertaba a comienzos del conflicto de que Iraq y Kuwait podrían verse forzados a recortar producción en cuestión de días. Goldman Sachs estimó una caída de la producción de crudo del Golfo Pérsico de <strong>14,5 mb/d</strong> en abril de 2026 respecto a niveles prebélicos.</p>
<p>Por países, el impacto fue desigual. Arabia Saudí, con mayor capacidad técnica y acceso parcial a rutas alternativas, logró mantener algo de producción. Iraq, Irán, Kuwait y Qatar quedaron expuestos con mayor intensidad. Un escenario ilustrativo elaborado por Commodity Context estimaba que, asumiendo un cierre hasta el 20 de abril de 2026, la pérdida acumulada de producción del Golfo se acercaría a <strong>900 millones de barriles hacia julio de 2026</strong> — incluso considerando una recuperación gradual posterior a la reapertura.</p>
<p>La IEA, en su informe de marzo, estimaba que la oferta global caería en torno a <strong>8 mb/d</strong> ese mes, aunque parte se compensaría con más producción fuera de OPEC+. Además, recortó su previsión de crecimiento de demanda global para 2026 hasta <strong>+640 kb/d</strong>, unos 210 kb/d menos que en el informe anterior. El impacto no se limitó al crudo: la caída de flujos por Ormuz afectó de lleno al LPG, la nafta y el jet fuel, con consecuencias directas sobre la petroquímica asiática y las cancelaciones masivas de vuelos en Oriente Medio.</p>
<hr>
<h2>¿Cuánto se pudo compensar? Las rutas alternativas y sus límites</h2>
<p>Ante el cierre, los productores del Golfo con acceso a rutas alternativas activaron su capacidad de bypass. Las dos vías relevantes son bien conocidas:</p>
<p><strong>Arabia Saudí</strong> cuenta con el sistema Abqaiq-Yanbu (Petroline) hacia el Mar Rojo, con una capacidad de diseño de 5 mb/d — y Aramco afirmaba en marzo de 2025 poder llegar a 7 mb/d, aunque ese nivel nunca había sido probado de forma sostenida. A comienzos de 2026 utilizaba unos 2 mb/d por esa vía, dejando entre <strong>3 y 5 mb/d de capacidad libre</strong> según condiciones operativas.</p>
<p><strong>Los Emiratos Árabes Unidos</strong> disponen del oleoducto ADCOP desde Habshan hasta Fujairah, con capacidad cercana a 1,8 mb/d. Como ya exportaba unos 1,1 mb/d por esa vía antes del conflicto, el margen adicional era de apenas <strong>700 kb/d</strong>.</p>
<p>Sumando ambas vías, la capacidad alternativa total disponible se situaba en torno a <strong>3,5-5,5 mb/d</strong> — una fracción pequeña frente a los casi 20 mb/d que normalmente cruzan el estrecho. El resto de productores — Iraq, Kuwait, Irán, Qatar — no disponen de rutas alternativas viables a escala.</p>
<p>Del lado de la demanda, los países consumidores activaron sus reservas estratégicas. Los miembros de la IEA decidieron el 11 de marzo liberar <strong>400 millones de barriles</strong> de reservas de emergencia al mercado. Los inventarios globales observables, pese a partir de niveles altos, comenzaron a caer a un ritmo preocupante: JPMorgan estimaba una reducción de <strong>140 millones de barriles</strong> desde el inicio del conflicto, con un ritmo de caída de unos 2,7 mb/d. El banco proyectaba que los inventarios podrían alcanzar el <strong>nivel de estrés operativo</strong> (7,6 mil millones de barriles) en junio de 2026 y el <strong>suelo operacional</strong> (6,8 mil millones) en septiembre — el mínimo necesario para mantener en funcionamiento pipelines y refinerías.</p>
<hr>
<h2>Perspectivas y puntos de vista: lo que dicen los analistas</h2>
<p><strong>Goldman Sachs</strong> mantenía en su escenario base un Brent medio de <strong>85 dólares para 2026</strong>, con riesgos claramente sesgados al alza. En su análisis de abril, estimaba que Arabia Saudí y EAU podrían desplegar más de <strong>2 mb/d de capacidad ociosa</strong> por encima de niveles prebélicos para estabilizar el mercado tras una eventual reapertura — pero subrayaba que la velocidad de recuperación de la producción dependía mucho de la duración del cierre y del tipo de daño sufrido por los campos. Su estimación central apuntaba a recuperar alrededor del <strong>70% de la producción perdida tras tres meses</strong> de reapertura y el <strong>88% tras seis meses</strong>.</p>
<p><strong>JPMorgan</strong> advertía en su nota "The Illusion of Plenty" que los inventarios globales no eran tan cómodos como parecían. De los 8,4 mil millones de barriles globales, solo unos <strong>280 millones</strong> eran realísticamente accesibles sin comprometer la operativa del sistema — el resto estaba inmovilizado en almacenamiento flotante, stocks estratégicos o inventarios mínimos operativos. La conclusión era que el mercado tenía un colchón más fino de lo que sugería la cifra bruta.</p>
<p><strong>La IEA</strong> enfatizaba que el mercado no podía resolver el problema simplemente con "más oferta en otro sitio". Incluso una vez reabierto el paso, advertía que harían falta días o semanas para limpiar el backlog de barcos acumulados, y que parte de la producción tardaría semanas o meses en volver a niveles previos.</p>
<p>Un <strong>trader de energía entrevistado por Polymarket</strong> en abril ofrecía una visión más escéptica sobre el alto el fuego entonces negociado. En su análisis, cualquier acuerdo que dejase a Irán en posición de controlar el acceso a Ormuz sería inaceptable para los países del Golfo — especialmente Arabia Saudí. El problema no era el coste del peaje, sino que Irán pasaría a tener capacidad de regular arbitrariamente un flujo de 20 mb/d, superando con mucho la spare capacity de OPEC+. En su escenario optimista, el tráfico por el estrecho no recuperaría más del 50% del nivel prebélico en las primeras dos semanas, y haría falta entre <strong>6 y 8 semanas para recuperar más del 70% del volumen parado</strong> — incluso si la tregua aguantaba.</p>
<p>Hay también voces que apuntan a los límites de la destrucción de demanda como mecanismo de ajuste. Aunque los precios altos penalizan el consumo, especialmente en economías emergentes, la magnitud del shut-in productivo — estimado en 10-12 mb/d — hace matemáticamente imposible que la destrucción de demanda absorba el shock por sí sola. Durante el COVID, con la economía global prácticamente paralizada, se destruyó demanda por unos 15 mb/d. Un shock de precio sin colapso de actividad no puede generar un ajuste de esa magnitud.</p>
<hr>
<h2>Conclusión: una disrupción con cola larga</h2>
<p>Lo que hace singular este episodio no es solo la magnitud del shock inicial, sino la asimetría entre la velocidad de parada y la velocidad de recuperación. Detener producción puede ocurrir en días cuando el almacenamiento se satura. Reiniciarla exige verificar seguridad, recuperar operativa en terminales, asignar tankers, despejar rutas, vaciar inventarios acumulados y aumentar el bombeo progresivamente — un proceso que Bloomberg estimaba en 2-3 semanas para campos pequeños y 4-5 semanas para campos grandes en condiciones normales.</p>
<p>A eso se añade la incertidumbre geopolítica residual: incluso tras un alto el fuego, pocos armadores y aseguradoras querrán entrar al Golfo sin garantías de seguridad. Ese riesgo de prima persistente sobre el paso por Ormuz es, posiblemente, el cambio estructural más relevante que deja este episodio — independientemente de cómo evolucione la situación militar en los próximos meses.</p>
<hr>

};
